<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <!-- tailwind Css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
        body{
            background: #F8FAFC;
        }
    </style>
</head>

<body>
    <header class="w-[80%] mx-auto">
        <h1 class="mt-[60px] mb-5 text-[32px] font-bold text-[#002C5C] ">Job Application Tracker</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-[#F1F2F4] p-5 rounded-lg">
                <p class="text-sm font-medium">Total</p>
                <p id="total" class="text-2xl text-[#002C5C] font-bold">0</p>
            </div>

            <div class="bg-[#F1F2F4] p-5 rounded-lg">
                <p class="text-sm font-medium">Interview</p>
                <p id="interviewCount" class="text-2xl text-[#10B981] font-bold">0</p>
            </div>

            <div class="bg-[#F1F2F4] p-5 rounded-lg">
                <p class="text-sm font-medium">Rejected</p>
                <p id="rejectedCount" class="text-2xl text-[#EF4444] font-bold">0</p>
            </div>
        </div>
    </header>

    <hr class="w-[80%] mx-auto border border-[#E6E7E9] my-5">

    <main class="w-[80%] mx-auto">
        <div class="flex justify-between">
            <h2 class="pb-6 text-xl text-[#002C5C] font-semibold">Available Jobs</h2>
            <p class="text-[#64748B]"><span id="jobCount">0</span> jobs</p>
        </div>

        <div class="mb-6 flex gap-2">
            <button onclick="toggleStyle('all-filter-btn')" class="bg-[#3B82F6] text-white px-5 py-2 rounded-lg cursor-pointer"
                id="all-filter-btn">All</button>
            <button onclick="toggleStyle('interview-filter-btn')" class="bg-white px-5 py-2 text-[#64748B] rounded-lg cursor-pointer"
                id="interview-filter-btn">Interview</button>
            <button onclick="toggleStyle('rejected-filter-btn')" class="bg-white px-5 py-2 text-[#64748B] rounded-lg cursor-pointer"
                id="rejected-filter-btn">Rejected</button>
        </div>

        <!-- Filtered card -->

        <section id="filtered-section" class="hidden">

        </section>

        <section id="allCards" class="space-y-6">

            <!-- card 1 -->
            <div class="card flex justify-between bg-white border border-white p-6 rounded-lg">
                <!-- main part 1 -->
                <div class="space-y-6">
                    <!-- part 1 -->
                    <div>
                        <p class="jobTitle text-lg text-[#002C5C] font-semibold">Mobile First Corp</p>
                        <p class="jobDescription text-md text-[#64748B]">React Native Developer</p>
                    </div>

                    <!-- part 2 -->
                    <div class="flex gap-2">
                        <p class="salary text-md text-[#64748B]">Remote • Full-time • $130,000 - $175,000</p>
                    </div>
                    <!-- part 3 -->
                    <p class="status px-3 py-2 text-[#002C5C] bg-[#EEF4FF] rounded-lg inline-block">NOT APPLIED</p>
                    <p class="notes text-[#323B49]">Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.</p>

                    <div class="flex gap-2">
                        <button class="interview-btn text-[#10B981] font-semibold border-2 border-[#10B981] rounded-lg px-3 py-2 cursor-pointer hover:text-white hover:bg-[#10B981]">INTERVIEW</button>
                        <button class="struggling-btn rejected-btn text-[#EF4444] font-semibold border-2 border-[#EF4444] rounded-lg px-3 py-2 cursor-pointer hover:text-white hover:bg-[#EF4444]">REJECTED</button>
                    </div>
                </div>

                <!-- main part 2 -->
                <div>
                    <button class="btn-delete border border-[#64748B] hover:border-[#EF4444] px-2 py-2 rounded-full cursor-pointer"><span class="text-[#64748B] hover:text-[#EF4444]"><i class="fa-regular fa-trash-can"></i></span></button>
                </div>
            </div>
           
            





        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
